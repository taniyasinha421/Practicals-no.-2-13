<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Frames Example - Maps & External Pages</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            background-color: black;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            display: flex;
            height: 90vh;
        }

        .left {
            width: 30%;
            background:pink;
            padding: 10px;
        }

        .right {
            width: 70%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        a {
            display: block;
            padding: 10px;
            margin: 5px 0;
            background: blue;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        a:hover {
            background:red;
        }
    </style>
</head>

<body>

<header>
    <h1></h1>
    <p>Embedding wikipedia ,youtube and External Web Pages using iframe</p>
</header>

<div class="container">

    
    <div class="left">
        <h3>Load Content</h3>

        <a href="https://www.wikipedia.org" target="contentFrame">Open Wikipedia</a>
<a href="https://www.youtube.com/embed/dQw4w9WgXcQ" target="contentFrame">
Open YouTube
</a>
        <a href="https://www.google.com" target="contentFrame">Open Google</a>
    </div>

    
    <div class="right">
        <iframe name="contentFrame" src="https://www.wikipedia.org"></iframe>
    </div>

</div>

</body>
</html>
