<!DOCTYPE html>
<html>
<head>
<title>Fun Event Registration</title>
</head>

<body bgcolor="pink">

<h1 align="center"> <u>Fun Event Registration Form </u></h1>

<form>
<fieldset>
<legend> <h4>Personal information</h4></legend>
<label>Enter Your Full Name:</label><br>
<input type="text"><br><br>

<label>Enter Your Email:</label><br>
<input type="email"><br><br>

<label>Enter Your Age:</label><br>
<input type="number" name="age"><br><br>

<label>Gender:</label><br>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
<input type="radio" name="gender"> Other
<br><br>
</fieldset>

<fieldset>
<legend> <h4>Select Your Talent </h4></legend>
<label>Choose Your Favorite Activity:</label><br>
<input type="checkbox"> Dancing <br>
<input type="checkbox"> Singing <br>
<input type="checkbox"> Gaming <br>
<input type="checkbox"> Drawing <br><br>
</fieldset>

<fieldset>
<legend> <h4>Select Colour </h4></legend>

<label>Favorite Color:</label><br>
<select>
<option>Red</option>
<option>Blue</option>
<option>Pink</option>
<option>Black</option>
<option>Purple</option>
<option>Orange</option>
</select>
<br><br>
<fieldset>

<label>Tell us why you want to join:</label><br>
<textarea rows="4" cols="30"></textarea>
<br><br>

<input type="submit" value="Register">
<input type="reset" value="Clear">

</form>
<hr>
<marquee><footer> <h3 style color="red">Enter correct details for better experience !</h3></footer></marquee>

</body>
</html>
